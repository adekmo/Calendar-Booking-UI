<link rel="stylesheet" href="../dist/booking-calendar.css">

<div id="calendar"></div>

<script src="../dist/booking-calendar.min.js"></script>

<script>

const calendar = new BookingCalendar("#calendar", {

    theme: "light",

    primaryColor: "#FFEB00",

    startHour: 9,
    endHour: 18,

    bookedSlots: {
        "2026-03-12": ["09:00", "10:30"],
        "2026-03-15": ["14:00"]
    },

    onDateSelect: (data) => {
        console.log("Date selected:", data.date)
    },

    onSlotSelect: (data) => {
        console.log("Slot selected:", data)
    }

})

</script>
